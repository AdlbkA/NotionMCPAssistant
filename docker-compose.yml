services:
  notion-agent:
    container_name: notion_agent
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - 8000:8000
    volumes:
      - storage:/app/storage
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://0.0.0.0:8000/health || exit 1" ]
      start_period: 30s
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  storage: